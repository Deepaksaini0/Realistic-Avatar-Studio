services:
  - type: web
    name: realistic-avatar-studio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # The "key" field is the env var NAME (read in code as process.env.DID_API_KEY).
      # NEVER put your actual API key here — it would get committed to GitHub.
      # `sync: false` tells Render to ask for the value in the dashboard instead.
      - key: DID_API_KEY
        sync: false
